# Render 배포 블루프린트 — 백엔드(FastAPI) 웹 서비스.
# Render → New → Blueprint → 이 레포 선택 → 시크릿(sync:false) 값만 입력.
services:
  - type: web
    name: pawdy-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PETFIT_PROVIDER
        value: openai          # 배포 기본 생성 모델 (gpt-image-2)
      - key: PETFIT_OPENAI_API_KEY
        sync: false            # 대시보드에서 입력
      - key: PETFIT_REPLICATE_TOKEN
        sync: false
      - key: PETFIT_KAKAO_REST_API_KEY
        sync: false
      - key: PETFIT_KAKAO_REDIRECT_URI
        sync: false            # https://<백엔드도메인>/auth/kakao/callback
      - key: PETFIT_FRONTEND_URL
        sync: false            # https://<vercel-앱도메인>
      - key: PETFIT_JWT_SECRET
        generateValue: true    # 자동 생성
